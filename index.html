<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Constelação de Órion - Arco Completo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Evita o realce azul no toque */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #040712;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        #skyCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI/UX: Design Glassmorphism Mobile-First */
        .ui-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            pointer-events: none; /* Permite interações através dos espaços vazios */
        }

        .info-panel {
            background: rgba(5, 10, 25, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto; /* Reativa interações no painel */
            max-width: 100%;
        }

        .info-panel h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-panel p {
            font-size: 12px;
            line-height: 1.5;
            color: #94a3b8;
            font-weight: 300;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            padding-bottom: 10px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Ajustes para telas maiores (Desktop/Tablet) */
        @media (min-width: 768px) {
            .ui-container { padding: 40px; }
            .info-panel { max-width: 360px; }
            .info-panel h1 { font-size: 22px; }
            .info-panel p { font-size: 14px; }
            .hint { font-size: 13px; text-align: left; }
        }
    </style>
</head>
<body>

    <canvas id="skyCanvas"></canvas>

    <div class="ui-container">
        <div class="info-panel">
            <h1>Constelação de Órion</h1>
            <p>Toque nas estrelas brilhantes para ver o Arco do Caçador e os nomes de cada uma.</p>
        </div>
        <div class="hint">Toque nas estrelas para interagir</div>
    </div>

    <script>
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let backgroundStars = [];
        let touchPos = { x: -1000, y: -1000 };

        // Definição das estrelas: Coordenadas normalizadas (-1 a 1)
        // Isso garante que a geometria permaneça perfeita em qualquer tela.
        // Incluindo o Arco (Pi Orionis e Rho Ori)
        const orionStars = [
            // Corpo Principal
            { id: 0, name: "Betelgeuse", x: -0.4, y: -0.6, color: "#ff9f68", r: 6 },
            { id: 1, name: "Meissa",     x: 0.05, y: -0.8, color: "#d1e8ff", r: 3.5 },
            { id: 2, name: "Bellatrix",  x: 0.5,  y: -0.5, color: "#d1e8ff", r: 4.5 },
            { id: 3, name: "Alnitak",    x: -0.2, y: -0.05,color: "#d1e8ff", r: 4.5 },
            { id: 4, name: "Alnilam",    x: 0.0,  y: 0.0,  color: "#e2f0ff", r: 5 },
            { id: 5, name: "Mintaka",    x: 0.2,  y: 0.05, color: "#d1e8ff", r: 4 },
            { id: 6, name: "Saiph",      x: -0.3, y: 0.6,  color: "#d1e8ff", r: 4.5 },
            { id: 7, name: "Rigel",      x: 0.5,  y: 0.5,  color: "#a3c2ff", r: 6.5 },
            // Arco do Caçador (Escudo)
            { id: 8, name: "π¹ Ori", x: 0.8,  y: -0.3, color: "#d1e8ff", r: 3 },
            { id: 9, name: "π³ Ori", x: 0.85, y: -0.1, color: "#d1e8ff", r: 3 },
            { id: 10,name: "π⁴ Ori", x: 0.82, y: 0.1,  color: "#d1e8ff", r: 3 },
            { id: 11,name: "π⁵ Ori", x: 0.75, y: 0.25, color: "#d1e8ff", r: 3 },
            { id: 12,name: "π⁶ Ori", x: 0.65, y: 0.35, color: "#d1e8ff", r: 3 }
        ];

        // Conexões: Corpo e Arco
        const connections = [
            // Corpo
            [0, 1], [2, 1],
            [0, 3], [2, 5],
            [3, 4], [4, 5],
            [3, 6], [5, 7],
            // Arco (Escudo)
            [2, 8], [8, 9], [9, 10], [10, 11], [11, 12]
        ];

        function resize() {
            // Suporte para telas Retina/Alta densidade
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            initBackgroundStars();
        }

        function initBackgroundStars() {
            backgroundStars = [];
            // Densidade ajustada para mobile
            const numStars = Math.floor((width * height) / 3000); 
            for (let i = 0; i < numStars; i++) {
                backgroundStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 1.2,
                    opacity: Math.random(),
                    twinkleSpeed: 0.01 + Math.random() * 0.02
                });
            }
        }

        // Sistema de Interação Unificado (Mouse + Touch)
        function updateInteraction(e) {
            if (e.touches && e.touches.length > 0) {
                touchPos.x = e.touches[0].clientX;
                touchPos.y = e.touches[0].clientY;
            } else {
                touchPos.x = e.clientX;
                touchPos.y = e.clientY;
            }
        }

        function clearInteraction() {
            touchPos.x = -1000;
            touchPos.y = -1000;
        }

        // Listeners de evento responsivos
        window.addEventListener('mousemove', updateInteraction);
        window.addEventListener('touchstart', updateInteraction, { passive: true });
        window.addEventListener('touchmove', updateInteraction, { passive: true });
        window.addEventListener('touchend', clearInteraction);
        window.addEventListener('mouseleave', clearInteraction);
        window.addEventListener('resize', resize);

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 1. Estrelas de fundo
            backgroundStars.forEach(star => {
                star.opacity += star.twinkleSpeed;
                if (star.opacity > 1 || star.opacity < 0.2) star.twinkleSpeed = -star.twinkleSpeed;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });

            // Lógica Proporcional Mobile-First
            const minDimension = Math.min(width, height);
            const boxSize = minDimension * 0.7; // Ocupa 70% da tela para segurança
            const centerX = width / 2;
            const centerY = height / 2;

            // Função para converter coordenadas normalizadas em pixels
            function getCanvasCoords(star) {
                return {
                    x: centerX + (star.x * (boxSize / 2)),
                    y: centerY + (star.y * (boxSize / 2))
                };
            }

            // 2. Linhas de conexão
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 1.2;
            ctx.setLineDash([4, 4]); // Tracejado elegante
            ctx.beginPath();
            
            connections.forEach(conn => {
                const pt1 = getCanvasCoords(orionStars[conn[0]]);
                const pt2 = getCanvasCoords(orionStars[conn[1]]);
                ctx.moveTo(pt1.x, pt1.y);
                ctx.lineTo(pt2.x, pt2.y);
            });
            ctx.stroke();
            ctx.setLineDash([]); 

            const time = Date.now() * 0.003;

            // 3. Renderizar estrelas principais e detecção de toque
            orionStars.forEach(star => {
                const coords = getCanvasCoords(star);

                // Hitbox aumentada: raio de 35px para facilitar o toque com o dedo
                const dist = Math.hypot(touchPos.x - coords.x, touchPos.y - coords.y);
                const isInteracting = dist < 35;

                const pulse = Math.sin(time + star.id) * 0.4 + 0.6;
                const dynamicRadius = isInteracting ? star.r * 1.6 : star.r + (pulse * 1);

                // Efeito Glow (Brilho Espacial)
                ctx.shadowBlur = isInteracting ? 20 : 12;
                ctx.shadowColor = star.color;

                ctx.beginPath();
                ctx.arc(coords.x, coords.y, dynamicRadius, 0, Math.PI * 2);
                ctx.fillStyle = isInteracting ? "#ffffff" : star.color;
                ctx.fill();

                ctx.shadowBlur = 0; // Reset do glow

                // Rótulo dos Nomes
                ctx.fillStyle = isInteracting ? "#ffffff" : "rgba(255, 255, 255, 0.55)";
                ctx.font = isInteracting ? "600 13px Inter, sans-serif" : "400 11px Inter, sans-serif";
                
                // Texto ao lado da estrela
                ctx.fillText(star.name, coords.x + 10, coords.y + 4);
            });

            requestAnimationFrame(animate);
        }

        // Inicialização
        resize();
        animate();
    </script>
</body>
</html>
