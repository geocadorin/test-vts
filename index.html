<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constelação de Órion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050814;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            /* Gradiente radial para simular a profundidade do espaço */
            background: radial-gradient(circle at center, #0a1128 0%, #03050d 100%);
        }

        #skyCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI/UX: Painel Glassmorphism */
        .info-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* Permite que o mouse interaja com o canvas através do painel */
            animation: fadeIn 1s ease-out;
        }

        .info-panel h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-panel p {
            font-size: 14px;
            line-height: 1.6;
            color: #a0aec0;
            font-weight: 300;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .info-panel {
                top: 20px;
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>

    <canvas id="skyCanvas"></canvas>

    <div class="info-panel">
        <h1>Constelação de Órion</h1>
        <p>O Caçador. Uma das constelações mais proeminentes e reconhecíveis do céu noturno, abrigando estrelas supergigantes e as famosas "Três Marias" (Cinturão de Órion).</p>
    </div>

    <div class="hint">Passe o mouse sobre as estrelas para interagir</div>

    <script>
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        let mouse = { x: -1000, y: -1000 };

        const orionStars = [

            { id: 2, name: "Bellatrix",  x: 90,  y: -120, color: "#d1e8ff", r: 4.5 },
            { id: 3, name: "Alnitak",    x: -40, y: -10,  color: "#d1e8ff", r: 4.5 },

            { id: 6, name: "Saiph",      x: -70, y: 160,  color: "#d1e8ff", r: 4.5 },
            { id: 7, name: "Rigel",      x: 100, y: 140,  color: "#a3c2ff", r: 6.5 }  // Supergigante azul
        ];

        // Ligações que formam o desenho da constelação
        const connections = [
            [0, 1], [2, 1], // Cabeça (Meissa) para os ombros
            [0, 3], [2, 5], // Ombros para o cinturão
            [3, 4], [4, 5], // Cinturão (Três Marias)
            [3, 6], [5, 7]  // Cinturão para os pés
        ];

        // Função para redimensionar o canvas
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initBackgroundStars();
        }

        // Gera o campo estelar de fundo
        function initBackgroundStars() {
            backgroundStars = [];
            const numStars = Math.floor((width * height) / 2500); // Densidade baseada na tela
            for (let i = 0; i < numStars; i++) {
                backgroundStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 1.5,
                    opacity: Math.random(),
                    twinkleSpeed: 0.02 + Math.random() * 0.03
                });
            }
        }

        // Monitora o mouse para interatividade (Hover)
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', resize);

        // Loop principal de renderização
        function animate() {
            // Limpa o frame anterior (usando fillRect com opacidade para rastro/suavidade)
            ctx.clearRect(0, 0, width, height);

            // 1. Desenhar estrelas de fundo
            backgroundStars.forEach(star => {
                star.opacity += star.twinkleSpeed;
                if (star.opacity > 1 || star.opacity < 0.2) {
                    star.twinkleSpeed = -star.twinkleSpeed;
                }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });

            const centerX = width / 2;
            const centerY = height / 2;
